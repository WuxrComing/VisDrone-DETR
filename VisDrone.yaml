# Ultralytics YOLO 🚀, GPL-3.0 license
# VisDrone2019-DET dataset https://github.com/VisDrone/VisDrone-Dataset by Tianjin University
# Example usage: python train.py --data VisDrone.yaml
# parent
# ├── yolov5
# └── datasets
#     └── VisDrone  ← downloads here (2.3 GB)



# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
# path: E:\\DataSet\\VisDrone\\ # dataset root dir
path:  # dataset root dir
train: /mnt/nas/DataSet/VisDrone/VisDrone2019-DET-train/images  # train images (relative to 'path')  6471 images
val: /mnt/nas/DataSet/VisDrone/VisDrone2019-DET-val/images  # val images (relative to 'path')  548 images
test: /mnt/nas/DataSet/VisDrone/VisDrone2019-DET-test-dev/images  # test images (optional)  1610 images
annotations: annotations # including : instances_images.json  instances_test.json  instances_val.json
# for yolov6
anno_path: /mnt/nas/DataSet/VisDrone/annotations/instances_val.json 

is_coco: False

# Classes
nc: 10  # number of classes
names: ['pedestrian', 'people', 'bicycle', 'car', 'van', 'truck', 'tricycle', 'awning-tricycle', 'bus', 'motor']
# nc: 2  # number of classes
# names: ['pedestrian', 'people']